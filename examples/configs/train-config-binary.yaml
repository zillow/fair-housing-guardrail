input_data:
    content_column: 'content'
    label_column: 'label'
    max_length: 512
    input_data_path: './datasets/sample_data_binary.jsonl'
    stop_list_path: './datasets/sample_stoplist.txt'
    is_binary: True
    
output_data:
    output_dir: '../output/binary_model_and_tokenizer/'

model:
    do_train: True
    learning_rate: 1e-5
    train_batch_size: 4
    eval_batch_size: 4
    num_train_epochs: 5
    weight_decay: 0.01
    eval_steps: 1
    logging_steps: 1
    save_steps: 1
    save_total_limit: 3
    
fairhousing:
    threshold: 0.5
